{{ define "page" }}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTMX Arcade</title>
  <link rel="stylesheet" href="/static/pico.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    #error-banner:not(:empty) { background: var(--pico-del-color, #fee); color: var(--pico-color-red-700, #900); padding: 0.5rem 1rem; border-radius: 0.25rem; margin: 0.5rem 0; }
    #wizard-frame { margin-top: 1rem; }
    .row-group > * + * { margin-left: 0.5rem; }
    .arcade-controls { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    /* 2048 board */
    #twenty48-board { display: inline-block; padding: 0.5rem; background: #bbada0; border-radius: 0.5rem; }
    #twenty48-board table { border-collapse: separate; border-spacing: 0.4rem; margin: 0; }
    #twenty48-board td { width: 4rem; height: 4rem; text-align: center; font-weight: bold; font-size: 1.6rem; background: #cdc1b4; border-radius: 0.25rem; color: #776e65; }
    #twenty48-board td.empty { color: transparent; }
    #twenty48-board td[data-v="2"]    { background: #eee4da; }
    #twenty48-board td[data-v="4"]    { background: #ede0c8; }
    #twenty48-board td[data-v="8"]    { background: #f2b179; color: #fff; }
    #twenty48-board td[data-v="16"]   { background: #f59563; color: #fff; }
    #twenty48-board td[data-v="32"]   { background: #f67c5f; color: #fff; }
    #twenty48-board td[data-v="64"]   { background: #f65e3b; color: #fff; }
    #twenty48-board td[data-v="128"]  { background: #edcf72; color: #fff; font-size: 1.3rem; }
    #twenty48-board td[data-v="256"]  { background: #edcc61; color: #fff; font-size: 1.3rem; }
    #twenty48-board td[data-v="512"]  { background: #edc850; color: #fff; font-size: 1.3rem; }
    #twenty48-board td[data-v="1024"] { background: #edc53f; color: #fff; font-size: 1.1rem; }
    #twenty48-board td[data-v="2048"] { background: #edc22e; color: #fff; font-size: 1.1rem; }
    /* Minesweeper board */
    #minesweeper-board { display: inline-block; padding: 0.5rem; background: #c0c0c0; border-radius: 0.25rem; }
    .ms-grid { border-collapse: separate; border-spacing: 1px; margin: 0; background: #888; }
    .ms-cell { width: 28px; height: 28px; padding: 0; text-align: center; vertical-align: middle; font-weight: bold; font-family: var(--pico-font-family-monospace, monospace); position: relative; }
    .ms-cell.ms-hidden { background: #d4d4d4; padding: 0; }
    .ms-cell.ms-flagged { background: #d4d4d4; padding: 0; }
    .ms-cell.ms-revealed { background: #efefef; color: #333; }
    .ms-cell.ms-mine { background: #f88; color: #000; }
    .ms-cell .ms-reveal-btn { width: 100%; height: 100%; padding: 0; border: none; background: transparent; cursor: pointer; font-size: 14px; line-height: 1; margin: 0; }
    .ms-cell .ms-reveal-btn:hover { background: rgba(0,0,0,0.05); }
    .ms-cell .ms-flag-btn { position: absolute; top: 0; right: 0; width: 11px; height: 11px; padding: 0; border: none; background: rgba(0,0,0,0.1); cursor: pointer; font-size: 9px; line-height: 1; margin: 0; color: #c00; }
    .ms-cell .ms-flag-btn:hover { background: rgba(0,0,0,0.2); }
    .ms-cell.ms-revealed[data-n="1"] { color: #1976d2; }
    .ms-cell.ms-revealed[data-n="2"] { color: #388e3c; }
    .ms-cell.ms-revealed[data-n="3"] { color: #d32f2f; }
    .ms-cell.ms-revealed[data-n="4"] { color: #1565c0; }
    .ms-cell.ms-revealed[data-n="5"] { color: #b71c1c; }
    .ms-cell.ms-revealed[data-n="6"] { color: #00838f; }
    .ms-cell.ms-revealed[data-n="7"] { color: #424242; }
    .ms-cell.ms-revealed[data-n="8"] { color: #616161; }
    /* Snake board */
    .snake-grid { display: grid; gap: 1px; background: #1a1a1a; padding: 2px; width: fit-content; border-radius: 0.25rem; }
    .snake-cell { width: 18px; height: 18px; background: #2a2a2a; }
    .snake-cell.snake-head { background: #7ee787; box-shadow: inset 0 0 0 2px #2da44e; }
    .snake-cell.snake-body { background: #4ac26b; }
    .snake-cell.snake-food { background: #f85149; border-radius: 50%; }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <hgroup>
        <h1>HTMX Arcade</h1>
        <p>Zero JavaScript. Server-rendered HTML. <a href="https://github.com/kingychiu/no-js-arcade" target="_blank">source</a></p>
      </hgroup>
    </header>
    <div id="error-banner" aria-live="polite"></div>
    <section id="wizard-frame">
      {{ template "wizard_frame" . }}
    </section>
  </main>
</body>
</html>{{ end }}
