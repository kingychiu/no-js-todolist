{{ define "content" }}
<form hx-post="/todos" hx-target="#todo-list" hx-swap="beforeend">
  <fieldset role="group">
    <input name="title" placeholder="What needs doing?" autofocus required>
    <button type="submit">Add</button>
  </fieldset>
</form>
<ul id="todo-list">
  {{ range . }}{{ template "todo_item.html" . }}{{ end }}
</ul>
{{ end }}
